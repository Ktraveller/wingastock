{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/style1.css' %}">
  <link rel="stylesheet" href="{% static 'css/style2.css' %}">

  <link rel="stylesheet" href="{% static 'css/search.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <title>Wingastock | Bidhaa</title>

  <meta name="description" content="Nunua na uza bidhaa za electoniki kama simu, laptops, TV, 
    pia tunauza samani za ndani (furniture), vyumba, nyumba na bidhaa mbalimbali kupitia jukwaa letu wingastock ">

  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://wingastock.onrender.com/">

  <meta property="og:title" content="Wingastock">

  <meta property="og:description" content="Soko mtandao Tanzania">


  <meta property="og:type" content="website">

  <meta property="og:image" content="/static/logo.png">

  <link rel="shortcut icon" href="{% static 'logo.png' %}" type="image/x-icon">

  <meta name="google-site-verification" content="cBo6MO_R0NHmkbNtZ4TbAd5KcLYgqPdt0XB-BgMYi1o" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-STT2EJ7H54"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-STT2EJ7H54');
  </script>
</head>

<body>

  <div class="row-holder-001">

    <div class="header-holder-002">
      <div class="header-content-holder-003">
        <h1 style="font-size: 20px;">{{ product.title }}</h1>
      </div>
    </div>

    <div class="content-holder-002">

      <!-- Preview product -->
      <div class="preview-product-holder-003">

        <div class="preview-product-004">
          <div class="preview-pic-005">
            {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.title }}">
            {% endif %}
          </div>
          <div class="preview-details-005" style="margin-bottom: 100px;">
            <div>
              <p style="font-weight: bold;">{{ product.title }}</p>
              <p>
              <pre>{{ product.description }}</pre>
              </p>
              <p>{{ product.price }}</p>

              <div class="actions-holder-005">
                <div>
                  <button type="button" class="b1" onclick="window.location.href=`tel:+255711319475`"><i
                      class="fas fa-phone"></i> Ongea na muuzaji</button>
                </div>

                <div>
                  <button type="button" class="b2"
                    onclick="window.location.href=`https://wa.me/255711319475?text=Habari, naulizia {{ product.title }}`"><i
                      class="fab fa-whatsapp"></i> Tuma meseji whatsapp</button>
                </div>

                <div>
                  <button type="button" id="shareBtn" class="b3"><i class="fas fa-share-alt"></i> Sambaza
                    bidhaa</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>



    </div>

    <!-- Nav bar -->
    {% include 'navbar.html' %}

  </div>


  <script>
    const shareBtn = document.getElementById("shareBtn");

    shareBtn.addEventListener("click", async () => {

      try {

        const response = await fetch("{{ product.image.url }}");
        const blob = await response.blob();

        const file = new File(
          [blob],
          "product.jpg",
          { type: blob.type }
        );

        if (navigator.canShare &&
          navigator.canShare({ files: [file] })) {

          await navigator.share({
            title: "{{ product.title|escapejs }}",
            text: "{{ product.title|escapejs }}\n\n{{ product.description|truncatechars:150|escapejs }}",
            url: window.location.href,
            files: [file]
          });

        } else {

          await navigator.share({
            title: "{{ product.title|escapejs }}",
            text: "{{ product.title|escapejs }}\n\n{{ product.description|truncatechars:150|escapejs }}",
            url: window.location.href
          });

        }

      } catch (error) {
        console.error(error);
      }

    });
  </script>
</body>

</html>
