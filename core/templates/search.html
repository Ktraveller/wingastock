{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
    <link rel="stylesheet" href="{% static 'css/search.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <title>Wingastock | Tafuta bidhaa</title>

    <meta name="description" content="Nunua na uza bidhaa za electoniki kama simu, laptops, TV, 
    pia tunauza samani za ndani (furniture), vyumba, nyumba na bidhaa mbalimbali kupitia jukwaa letu wingastock ">

    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://wingastock.onrender.com/">

    <meta property="og:title" content="Wingastock">

    <meta property="og:description" content="Soko mtandao Tanzania">


    <meta property="og:type" content="website">

    <meta property="og:image" content="/static/logo.png">

    <link rel="shortcut icon" href="{% static 'logo.png' %}" type="image/x-icon">

    <meta name="google-site-verification" content="cBo6MO_R0NHmkbNtZ4TbAd5KcLYgqPdt0XB-BgMYi1o" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-STT2EJ7H54"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-STT2EJ7H54');
    </script>
</head>

<body>

    <div class="row-holder-001">

        <div class="header-holder-002">
            <div class="header-content-holder-003">
                <h1 style="font-size: 20px;">Tafuta bidhaa</h1>
            </div>
        </div>

        <div class="content-holder-002">

            <!-- Saerch product -->
            <div class="search-product-holder-0003">
                <div class="search-product-0004">
                    <input type="text" placeholder="Tafuta bidhaa ..." id="searchInput">
                </div>
            </div>

            <!-- In list form -->
            <div class="list-fav-product-holder-003 search-0003">
                <div class="list-fav-product-003" id="buttonContainer">

                    {% for product in search_result %}

                    <div>
                        <div class="list-fav-003"
                            onclick="window.location.href=`{% url 'product_details' product.id %}`">
                            <div class="fav-image-003">
                                {% if product.image %}
                                <img src="{{ product.image.url }}" alt="{{ product.title }}">
                                {% endif %}
                            </div>
                            <div class="fav-details-003">
                                <p style="font-weight: 900;">{{ product.title }}</p>
                                <p>{{ product.description|truncatechars:200 }}</p>
                                <span style="font-size: 18px; font-weight: bold;">{{ product.price }} Tsh</span>
                            </div>
                        </div>
                    </div>

                    {% endfor %}

                </div>
            </div>

             <div style="width: 100%; height: 100px; float: left;"></div>

        </div>

        <!-- Nav bar -->
        {% include 'navbar.html' %}

    </div>

    <script>
        const searchInput = document.getElementById("searchInput");
        const products = document.querySelectorAll("#buttonContainer > div");

        searchInput.addEventListener("input", function () {
            const searchText = this.value.toLowerCase().trim();

            products.forEach(product => {
                // Get the title and description
                const title = product.querySelector(".fav-details-003 p:first-child")?.textContent.toLowerCase() || "";
                const description = product.querySelector(".fav-details-003 p:nth-child(2)")?.textContent.toLowerCase() || "";

                if (
                    title.includes(searchText) ||
                    description.includes(searchText)
                ) {
                    product.style.display = "";
                } else {
                    product.style.display = "none";
                }
            });
        });
    </script>

</body>

</html>
