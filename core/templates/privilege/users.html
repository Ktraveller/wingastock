{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winga Platform | Users</title>

  <link rel="stylesheet" href="{% static 'admin_css/user.css' %}">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h2>Winga Platform</h2>

    <a href="{% url 'admin_home' %}">Dashboard</a>
    <a href="{% url 'admin_users' %}" class="active-link">Users</a>
    <a href="{% url 'admin_products' %}">Products</a>
    <a href="{% url 'admin_messages' %}">Messages</a>
    <a href="{% url 'admin_statistics' %}">Statistics</a>
    <a href="{% url 'admin_settings' %}">Settings</a>
    <a href="{% url 'logout_admin' %}">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- NAVBAR -->
    <div class="navbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>

      <h2>Users Management</h2>

      <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search users..." onkeyup="searchUsers()" />

        <div class="admin-badge">Admin</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="usersTable">

          <tr>
            <td>001</td>
            <td>John Doe</td>
            <td>john@example.com</td>
            <td>Buyer</td>
            <td><span class="active">Active</span></td>
            <td>
              <button class="btn edit" onclick="editUser(this)">Edit</button>
              <button class="btn delete" onclick="deleteUser(this)">Delete</button>
            </td>
          </tr>

          <tr>
            <td>002</td>
            <td>Jane Smith</td>
            <td>jane@example.com</td>
            <td>Seller</td>
            <td><span class="pending">Pending</span></td>
            <td>
              <button class="btn edit" onclick="editUser(this)">Edit</button>
              <button class="btn delete" onclick="deleteUser(this)">Delete</button>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </main>

  <script src="{% static 'admin_js/dash.js' %}"></script>
</body>

</html>
