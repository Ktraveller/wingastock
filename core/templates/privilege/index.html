{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winga Platform | Admin Dashboard</title>

  <link rel="stylesheet" href="{% static 'admin_css/dash.css' %}">


</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <h2>Winga Platform</h2>

    <a href="{% url 'admin_home' %}">Dashboard</a>
    <a href="{% url 'admin_products' %}" class="active-link">Products</a>
    <a href="{% url 'logout_admin' %}">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1>Admin Dashboard</h1>
      <div class="profile">Admin</div>
    </div>

    <!-- STATS CARDS -->
    <section class="cards">
      <div class="card">
        <h3>Total Products</h3>
        <p>{{ total_products.total }}</p>
      </div>

      <div class="card">
        <h3>Active Sellers</h3>
        <p>{{ total_seller.total }}</p>
      </div>


    </section>

  </main>

  <script src="{% static 'admin_js/dash.js' %}"></script>
</body>

</html>
